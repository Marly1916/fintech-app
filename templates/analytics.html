<!DOCTYPE html>
<html>
<head>
<title>Analytics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<button class="toggle-btn" onclick="toggleDark()" id="themeBtn">🌙</button>

<div class="container">

<h2>Analytics</h2>

<div class="card">
<h3>Monthly Spending</h3>
<canvas id="lineChart"></canvas>
</div>

<div class="card">
<h3>Income vs Expenses</h3>
<canvas id="barChart"></canvas>
</div>

<div class="card">
<h3>Spending by Category</h3>
<div class="chart-container">
<canvas id="pieChart"></canvas>
</div>
</div>

<div class="card">
<h3>Top Spending</h3>
{% for c in top_categories %}
<p>🥇 {{ c[0] }} — {{ c[1] }}</p>
{% endfor %}
</div>

<div class="card">
<h3>Insights</h3>
{% for insight in insights %}
<p>{{ insight }}</p>
{% endfor %}
</div>

</div>

<div class="nav">
<a href="/"><i class="fas fa-home"></i><span>Home</span></a>
<a href="/transactions"><i class="fas fa-exchange-alt"></i><span>Transactions</span></a>
<a href="/analytics"><i class="fas fa-chart-pie"></i><span>Analytics</span></a>
<a href="/profile"><i class="fas fa-user"></i><span>Profile</span></a>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
new Chart(document.getElementById("lineChart"), {
type: "line",
data: { labels: {{ month_labels|tojson }}, datasets: [{ data: {{ month_values|tojson }}, tension: 0.3 }] }
});

new Chart(document.getElementById("barChart"), {
type: "bar",
data: { labels: ["Income","Expenses"], datasets: [{ data: [{{ income }},{{ expenses }}] }] }
});

new Chart(document.getElementById("pieChart"), {
type: "pie",
data: { labels: {{ labels|tojson }}, datasets: [{ data: {{ values|tojson }}] }
});
</script>

</body>
</html>
